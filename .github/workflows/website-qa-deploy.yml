name: Website QA Deploy
on:
  push:
    paths:
      - 'hugo/**'
  pull_request:
    paths:
      - 'hugo/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Hugo site and deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build Hugo site
        run: |
          cd hugo/site
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
        env:
          HUGO_PARAMS_GOOGLEANALYTICSID: G-RQCDXSWTLG
          HUGO_PARAMS_GOOGLEADSENSEID: ca-pub-2847616693333026
          # Create ad unit at AdSense console → Ads → By ad unit → Display ads
          # Then paste the numeric data-ad-slot value here
          HUGO_PARAMS_ADSLOTTICKER: "4937671520"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo/site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
