# Strategy help text (for JS)
[js_help_dividend_daddy]
other = "Finds stocks with high dividend yields and low volatility (beta). Best for income-focused, conservative investors seeking steady returns."

[js_help_moon_shot]
other = "Identifies high-growth potential stocks with high beta (volatility) and oversold conditions (low RSI). For aggressive growth seekers willing to take risks."

[js_help_falling_knife]
other = "Contrarian strategy finding oversold stocks trading below their 200-day moving average. \"Catching a falling knife\" - high risk but potential for bounce-back gains."

[js_help_over_hyped]
other = "Finds overbought stocks with high RSI values, suggesting momentum exhaustion. Good for short sellers or mean-reversion traders expecting pullbacks."

[js_help_institutional_whale]
other = "Targets large-cap stocks likely held by institutional investors. \"Follow the smart money\" - more stable, liquid, and widely covered by analysts."

[js_help_reit_radar]
other = "Scores REITs on dividend yield (40%), price-to-NAV (30%), and gearing (30%). Only Real Estate Investment Trusts are scored — non-REITs are excluded."

