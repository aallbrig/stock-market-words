[home_why_title]
other = "Why does this exist?"

[home_why_p1]
other = "Stock ticker symbols hide everywhere in financial writing — in news articles, analyst reports, earnings call transcripts, even social media. Reading \"Nvidia\" doesn't tell you the ticker is <strong>NVDA</strong>. \"Ford\" could be <strong>F</strong>. A Reddit post about \"the cat sat on the mat\" accidentally contains <strong>CAT</strong> and <strong>MAT</strong>."

[home_why_p2]
other = "This tool solves that. Paste any text, see every valid ticker the text contains, and immediately get strategy scores for each one — so you can decide what to look into further."

