{{ if .Site.Params.proEnabled }}
<div class="pro-gate-wrapper" style="display:none" data-pro-content="true">
  {{ .Inner | safeHTML }}
</div>
<div class="pro-gate-locked" data-pro-locked="true">
  <p>🔒 Pro subscribers only. <a href="/pro/">Subscribe for SGD $29.99/month →</a></p>
</div>
<script>
if (typeof ProAuth !== 'undefined' && ProAuth.isLoggedIn()) {
  document.querySelectorAll('[data-pro-content]').forEach(function(el){ el.style.display=''; });
  document.querySelectorAll('[data-pro-locked]').forEach(function(el){ el.style.display='none'; });
}
</script>
{{ end }}
