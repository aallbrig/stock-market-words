{{/*
  strait-map.html — Interactive OpenStreetMap of the Strait of Malacca
  Uses Leaflet.js (CDN) with OpenStreetMap tiles.
  Shows: strait outline, major ports, shipping lane annotation.
*/}}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"
      integrity="sha256-QZFpF9DkpabUBLoCc7fQJVCmtag/LaVAfAkUJSfuNyY=" crossorigin="" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"
        integrity="sha256-MgH13bFTTNqsnuEoqNPBLDaqxjGH+lCpqrukmXc8Ppg=" crossorigin=""></script>

<div id="strait-map" style="height: 420px; width: 100%; border-radius: 8px; border: 1px solid #dee2e6; margin: 1.5rem 0;"></div>

<script>
(function() {
  var map = L.map('strait-map', {
    scrollWheelZoom: false
  }).setView([3.0, 101.0], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 12
  }).addTo(map);

  // Strait of Malacca approximate waterway outline
  var straitPath = [
    [6.5, 95.5],   // NW entrance (Andaman Sea)
    [5.8, 96.5],
    [5.0, 98.0],
    [4.0, 99.5],
    [3.0, 100.5],
    [2.5, 101.5],
    [1.8, 102.5],
    [1.26, 103.85]  // SE exit (Singapore Strait)
  ];

  L.polyline(straitPath, {
    color: '#0d6efd',
    weight: 4,
    opacity: 0.7,
    dashArray: '10, 8',
    lineCap: 'round'
  }).addTo(map).bindPopup(
    '<strong>Primary Shipping Lane</strong><br>' +
    '~800 km long · 120,000+ vessels/year<br>' +
    '~25% of global maritime trade'
  );

  // Shaded strait area (approximate)
  var straitArea = [
    [6.8, 94.8], [6.0, 95.8], [5.2, 97.5], [4.2, 99.0],
    [3.2, 100.0], [2.4, 101.0], [1.6, 102.2], [1.1, 103.6],
    [1.4, 104.2], [2.0, 103.0], [2.8, 101.8], [3.6, 100.8],
    [4.5, 99.8], [5.5, 98.2], [6.3, 96.5], [7.0, 95.2]
  ];

  L.polygon(straitArea, {
    color: '#0d6efd',
    fillColor: '#0d6efd',
    fillOpacity: 0.08,
    weight: 1,
    opacity: 0.3
  }).addTo(map);

  // Port markers
  var portIcon = L.divIcon({
    className: '',
    html: '<div style="background:#dc3545;width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.4);"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  var ports = [
    { lat: 1.264, lng: 103.822, name: 'Port of Singapore',
      info: 'World\'s 2nd busiest port · 30M+ TEU/year · ~7% of GDP' },
    { lat: 3.0, lng: 101.4, name: 'Port Klang (Malaysia)',
      info: 'Malaysia\'s busiest port · Gateway to Kuala Lumpur' },
    { lat: 5.415, lng: 100.35, name: 'Port of Penang (Malaysia)',
      info: 'Historic Straits Settlement port · Northern strait access' },
    { lat: 1.797, lng: 102.048, name: 'Port of Tanjung Pelepas (Malaysia)',
      info: 'Major transshipment hub · Competes with Singapore' },
    { lat: 3.79, lng: 98.68, name: 'Belawan (Indonesia)',
      info: 'Sumatra\'s main port · Serves Medan metro area' },
    { lat: 1.087, lng: 104.05, name: 'Batam (Indonesia)',
      info: 'Free trade zone · Ship repair & logistics hub' }
  ];

  ports.forEach(function(p) {
    L.marker([p.lat, p.lng], { icon: portIcon })
      .addTo(map)
      .bindPopup('<strong>' + p.name + '</strong><br>' + p.info);
  });

  // Narrowest point annotation
  var narrowIcon = L.divIcon({
    className: '',
    html: '<div style="background:#fd7e14;width:8px;height:8px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.4);"></div>',
    iconSize: [8, 8],
    iconAnchor: [4, 4]
  });

  L.marker([1.35, 103.5], { icon: narrowIcon })
    .addTo(map)
    .bindPopup(
      '<strong>Narrowest Point</strong><br>' +
      '~2.8 km (1.5 nautical miles) wide<br>' +
      'Depth as shallow as 25 m — limits supertankers'
    );

  // Direction labels — positioned near terminus points, clear of markers and shipping lane
  // NW entrance label (Andaman Sea side, west of the strait polygon)
  L.marker([6.5, 94.0], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:rgba(255,255,255,0.92);padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#333;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.2);">← Middle East oil &amp; LNG</div>',
      iconSize: [160, 24],
      iconAnchor: [80, 12]
    })
  }).addTo(map);

  // SE exit label (South China Sea side, east of Singapore Strait exit)
  L.marker([0.6, 105.2], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:rgba(255,255,255,0.92);padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#333;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.2);">→ China, Japan, S. Korea</div>',
      iconSize: [160, 24],
      iconAnchor: [80, 12]
    })
  }).addTo(map);
})();
</script>

<p class="text-muted small text-center mt-1 mb-3">
  Interactive map — click ports for details. Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors.
</p>
